name: Feature Branch Test

on:
  push:
    branches-ignore: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        
      - name: Build Docker image
        run: |
          docker build -t conductor-app:${{ github.sha }} .
          echo "✅ Docker image built successfully"
      
      - name: Test Docker container
        run: |
          # Start container in background
          docker run -d -p 3001:3001 --name test-app conductor-app:${{ github.sha }}
          sleep 15
          
          # Test actual app URL
          curl http://localhost:3001/ || exit 1
          echo "✅ App is running and responding at http://localhost:3001"
          
          # Stop container
          docker stop test-app
          docker rm test-app
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Feature branch tested!**\n\n🔧 **Branch:** ${branch}\n🧪 **Tests:** Passed\n🐳 **Docker:** Built and tested successfully\n🌐 **App URL:** http://localhost:3001/ ✅\n\n**Ready to merge to main** → Will deploy to https://conductor-app.onrender.com`
            })
      
      - name: Add summary
        run: |
          echo "## ✅ Feature Branch Tested!" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${GITHUB_REF#refs/heads/}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Build:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "**App Test:** ✅ http://localhost:3001/ responded" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Ready to merge to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL:** https://conductor-app.onrender.com" >> $GITHUB_STEP_SUMMARY

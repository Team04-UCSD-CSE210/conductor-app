name: Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Deploy to Render
        run: |
          # Deploy to Render using their API
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
      
      - name: Notify team
        run: |
          echo "🚀 Production deployment complete!"
          echo "URL: https://conductor-app.onrender.com"
          echo "Database: Persistent PostgreSQL on Render"
          
          # Add to GitHub Actions summary
          echo "## 🚀 Production Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://conductor-app.onrender.com" >> $GITHUB_STEP_SUMMARY
          echo "**Database:** PostgreSQL on Render" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Live" >> $GITHUB_STEP_SUMMARY
